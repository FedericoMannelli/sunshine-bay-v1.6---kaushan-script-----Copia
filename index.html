<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Sunshine Bay | Luxury Stay</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Collegamento al file CSS nella cartella css/ -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <section class="hero">
      <div class="hero-images-container">
        <img
          src="https://images.unsplash.com/photo-1544124499-58912cbddada?auto=format&fit=crop&q=80&w=600"
          alt="View 1"
          class="hero-img hero-img-1"
        />
        <img
          src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&q=80&w=800"
          alt="View 2"
          class="hero-img hero-img-2"
        />
        <img
          src="https://images.unsplash.com/photo-1519046904884-53103b34b206?auto=format&fit=crop&q=80&w=600"
          alt="View 3"
          class="hero-img hero-img-3"
        />
      </div>

      <h1 class="hero-title">Sunshine Bay</h1>
    </section>

    <section class="storytelling">
      <div class="story-text">
        <h2>L'Anima della Baia</h2>
        <p>
          Sunshine Bay non è solo un resort, è un ritorno all'essenza del
          Mediterraneo. Tra i riflessi dorati del sole e il profumo del sale,
          ogni dettaglio è pensato per evocare un senso di pace e bellezza
          autentica.
        </p>
      </div>
    </section>

    <div style="height: 50vh"></div>

    <!-- Collegamento al file JS nella cartella js/ -->
    <script src="js/script.js"></script>
  </body>
</html>
